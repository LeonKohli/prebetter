name: Ruff

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Run Ruff
        uses: astral-sh/ruff-action@v3
        with:
          args: check --output-format=github 